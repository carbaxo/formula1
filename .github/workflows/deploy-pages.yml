name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/game-github-pages-mobile-r1kylf
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel an in-progress run.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (with "GitHub Actions" as the source) if it
          # isn't enabled yet, so no manual repo-settings step is required.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root; index.html is the game entry point.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
