<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>F1 - Simulador Machine Learning (Neon)</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; background: #0b0f19; font-family: "Outfit", sans-serif; color: white; }
    canvas { display: block; width: 100vw; height: 100vh; }
    
    #panel {
      position: absolute; top: 20px; left: 20px;
      background: rgba(18, 22, 36, 0.85); backdrop-filter: blur(10px);
      padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      min-width: 200px;
    }
    h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; color: #00f0ff; text-transform: uppercase; letter-spacing: 1px;}
    .stat { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #8b9bb4; font-weight: 500;}
    .stat span { font-weight: 700; color: white; font-variant-numeric: tabular-nums; }
    
    .btn-action {
      background: linear-gradient(135deg, #ff003c, #ff3366);
      border: none; border-radius: 6px; padding: 10px 15px; color: white;
      font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.2s;
    }
    .btn-action:hover { filter: brightness(1.1); transform: scale(1.02); }
  </style>
</head>
<body>
  <div id="panel">
    <h2>Laboratorio IA</h2>
    <div class="stat">Generación: <span id="ui-gen">1</span></div>
    <div class="stat">Coches vivos: <span id="ui-alive">100</span></div>
    <div class="stat">Mejor Distancia: <span id="ui-best">0</span></div>
    <button class="btn-action" onclick="forceNextGen()">MATA Y EVOLUCIONA</button>
  </div>
  
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    // --- MACHINE LEARNING CORE (NEURAL NETWORK) ---
    class Level {
      constructor(inputCount, outputCount) {
        this.inputs = new Array(inputCount);
        this.outputs = new Array(outputCount);
        this.biases = new Array(outputCount);
        this.weights = [];
        for (let i = 0; i < inputCount; i++) {
          this.weights[i] = new Array(outputCount);
        }
        Level.#randomize(this);
      }
      static #randomize(level) {
        for (let i = 0; i < level.weights.length; i++) {
          for (let j = 0; j < level.weights[i].length; j++) {
            level.weights[i][j] = Math.random() * 2 - 1;
          }
        }
        for (let i = 0; i < level.biases.length; i++) {
          level.biases[i] = Math.random() * 2 - 1;
        }
      }
      static feedForward(givenInputs, level) {
        for (let i = 0; i < level.inputs.length; i++) level.inputs[i] = givenInputs[i];
        for (let i = 0; i < level.outputs.length; i++) {
          let sum = 0;
          for (let j = 0; j < level.inputs.length; j++) sum += level.inputs[j] * level.weights[j][i];
          level.outputs[i] = sum + level.biases[i] > 0 ? 1 : 0; // Simple Step Activation
        }
        return level.outputs;
      }
    }

    class NeuralNetwork {
      constructor(neuronCounts) {
        this.levels = [];
        for (let i = 0; i < neuronCounts.length - 1; i++) {
          this.levels.push(new Level(neuronCounts[i], neuronCounts[i + 1]));
        }
      }
      static feedForward(givenInputs, network) {
        let outputs = Level.feedForward(givenInputs, network.levels[0]);
        for (let i = 1; i < network.levels.length; i++) {
          outputs = Level.feedForward(outputs, network.levels[i]);
        }
        return outputs;
      }
      static mutate(network, amount = 0.2) {
        network.levels.forEach(level => {
          for (let i = 0; i < level.biases.length; i++) {
            level.biases[i] = lerp(level.biases[i], Math.random() * 2 - 1, amount);
          }
          for (let i = 0; i < level.weights.length; i++) {
            for (let j = 0; j < level.weights[i].length; j++) {
              level.weights[i][j] = lerp(level.weights[i][j], Math.random() * 2 - 1, amount);
            }
          }
        });
      }
    }

    // --- GAME ENGINE ---
    const world = { width: 3200, height: 3200 };
    let viewport = { x: 0, y: 0, scale: 1 };
    
    // We only need one track to train on (Montmelo)
    const track = {
      roadWidth: 280,
      startGate: { a: { x: 1400, y: 2850 }, b: { x: 1400, y: 3050 } },
      waypoints: [
        { x: 1400, y: 2950 }, { x: 2600, y: 2950 }, 
        { x: 2950, y: 2800 }, { x: 3000, y: 2500 }, 
        { x: 3100, y: 2000 }, { x: 2850, y: 1550 }, 
        { x: 2300, y: 1450 }, { x: 1700, y: 1400 }, 
        { x: 1200, y: 1000 }, { x: 1400, y: 600 },  
        { x: 2200, y: 400 },  { x: 2800, y: 600 },  
        { x: 2950, y: 1000 }, { x: 2600, y: 1400 }, 
        { x: 2200, y: 1700 }, { x: 1700, y: 1800 }, 
        { x: 1100, y: 2000 }, { x: 800, y: 2400 },  
        { x: 900, y: 2800 }
      ]
    };

    function MathUtils() {}
    const lerp = (A, B, t) => A + (B - A) * t;
    const distanceSq = (x1, y1, x2, y2) => (x2 - x1) ** 2 + (y2 - y1) ** 2;

    function getSplinePoints(points, divisions = 10) {
      const spline = [];
      for (let i = 0; i < points.length; i++) {
        const p0 = points[(i + points.length - 1) % points.length];
        const p1 = points[i];
        const p2 = points[(i + 1) % points.length];
        const p3 = points[(i + 2) % points.length];
        for (let t = 0; t < 1; t += 1/divisions) {
          const t2 = t * t, t3 = t2 * t;
          const x = 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
          const y = 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
          spline.push({ x, y });
        }
      }
      return spline;
    }
    const trackSpline = getSplinePoints(track.waypoints, 12);

    function nearestTrackInfo(px, py) {
      let minDistSq = Infinity;
      for (let i = 0; i < trackSpline.length; i++) {
        const dSq = distanceSq(px, py, trackSpline[i].x, trackSpline[i].y);
        if (dSq < minDistSq) minDistSq = dSq;
      }
      return { distSq: minDistSq };
    }

    // --- CAR & SENSORS ---
    class Car {
      constructor(x, y) {
        this.x = x; this.y = y; this.angle = 0; this.speed = 0;
        this.width = 36; this.length = 64;
        
        this.steerView = 0;
        this.isDead = false;
        this.fitness = 0;
        this.nextCheckpoint = 1; // Empieza buscando el waypoint 1 (el 0 está justo detrás de la meta)
        this.checkpointsCleared = 0;
        this.laps = 0;
        this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
        
        // ML Components
        this.sensorAngles = [-Math.PI/3, -Math.PI/6, 0, Math.PI/6, Math.PI/3]; // 5 rays
        this.sensorReadings = [0,0,0,0,0];
        // Network: 6 inputs (5 sensors + speed) -> 5 hidden -> 4 outputs (Up, Down, Left, Right)
        this.brain = new NeuralNetwork([6, 5, 4]); 
      }

      update(dt) {
        if (this.isDead) return;

        // 1. Raycast Sensors to detect off-track distances
        const maxDrawDist = 400;
        for(let i = 0; i < this.sensorAngles.length; i++) {
          const rayAng = this.angle + this.sensorAngles[i];
          const dx = Math.cos(rayAng);
          const dy = Math.sin(rayAng);
          
          let dist = 10;
          let hitGrass = false;
          while (dist < maxDrawDist) {
            const rx = this.x + dx * dist;
            const ry = this.y + dy * dist;
            const tInfo = nearestTrackInfo(rx, ry);
            if (tInfo.distSq > (track.roadWidth * 0.45) ** 2) {
              hitGrass = true;
              break; // Found boundary
            }
            dist += 15;
          }
          // Sensor reading mapping: closer to grass = higher value (1.0 = Wall right here, 0.0 = Path clear)
          this.sensorReadings[i] = hitGrass ? 1.0 - (dist / maxDrawDist) : 0;
        }

        // 2. Feed data to Brain
        // Inputs: 5 distance measures + current normalized speed
        const inputs = [...this.sensorReadings, Math.abs(this.speed) / 450];
        const outputs = NeuralNetwork.feedForward(inputs, this.brain);
        
        const controls = {
          up: outputs[0] === 1,
          down: outputs[1] === 1,
          left: outputs[2] === 1,
          right: outputs[3] === 1
        };

        // 3. Apply Controls to Physics
        if (controls.up) this.speed += 250 * dt;
        if (controls.down) this.speed -= 350 * dt;
        
        const targetTurn = (controls.left ? -1 : 0) + (controls.right ? 1 : 0);
        this.steerView = lerp(this.steerView, targetTurn, dt * 5.0);
        const steerPower = 2.8 + Math.min(3.2, Math.abs(this.speed) / 80);
        this.angle += this.steerView * steerPower * dt * (this.speed >= 0 ? 1 : -1);

        this.speed -= Math.sign(this.speed) * 82 * dt; // Friction
        const minSpeed = (controls.up || controls.down) ? -90 : 0;
        this.speed = Math.max(Math.min(this.speed, 450), minSpeed);
        
        if (!controls.up && !controls.down && Math.abs(this.speed) < 5) this.speed = 0;

        // Apply movement
        this.x += Math.cos(this.angle) * this.speed * dt;
        this.y += Math.sin(this.angle) * this.speed * dt;
        
        // 4. Fitness and Death evaluation
        const currentDistToPathCenter = nearestTrackInfo(this.x, this.y).distSq;
        const grassThreshold = (track.roadWidth * 0.45) ** 2; // slightly inside bounds
        
        if (currentDistToPathCenter > grassThreshold) {
          this.isDead = true; // Died by off track
        }
        
        // Progress through strict waypoints to avoid skipping or crossing tracks
        const nextCp = track.waypoints[this.nextCheckpoint];
        const distToCpSq = distanceSq(this.x, this.y, nextCp.x, nextCp.y);
        
        // Pasa el waypoint si está a menos de 200px
        if (distToCpSq < 200 * 200) {
          this.checkpointsCleared++;
          this.nextCheckpoint = (this.nextCheckpoint + 1) % track.waypoints.length;
        }

        // Fitness = Checkpoints passed (massive reward) - Distance to next checkpoint
        if (!this.isDead) {
          this.fitness = (this.checkpointsCleared * 50000) - Math.sqrt(distToCpSq);
        }
      }

      draw(ctx) {
        if (this.isDead) return;
        const sx = (this.x - viewport.x) * viewport.scale;
        const sy = (this.y - viewport.y) * viewport.scale;
        
        // Draw Car
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        
        const w = this.length * viewport.scale;
        const h = this.width * viewport.scale;
        
        // F1 Body placeholder
        ctx.fillRect(-w/2, -h/4, w, h/2);
        ctx.fillStyle = "#111"; // Wheels
        ctx.fillRect(w/2 - 8, -h/2, 10, h);
        ctx.fillRect(-w/2 + 8, -h/2, 10, h);
        ctx.restore();

        // Draw Sensors (only for the best car to avoid visual mess)
        if (this === bestCar) {
          ctx.lineWidth = 1;
          for (let i = 0; i < this.sensorAngles.length; i++) {
            const rayAng = this.angle + this.sensorAngles[i];
            const val = this.sensorReadings[i];
            const dist = (1.0 - val) * 400; // Recalculate dist line
            
            const px = sx + Math.cos(rayAng) * dist * viewport.scale;
            const py = sy + Math.sin(rayAng) * dist * viewport.scale;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(px, py);
            ctx.strokeStyle = val > 0.5 ? "red" : "rgba(255, 255, 0, 0.4)";
            ctx.stroke();
          }
        }
      }
    }

    // --- GENETIC ALGORITHM LOGIC ---
    const TOTAL_CARS = 200;
    let cars = [];
    let bestCar = null;
    let generation = 1;
    let timeAlive = 0;
    
    // Spawn initial set
    for (let i = 0; i < TOTAL_CARS; i++) {
      cars.push(new Car(1400, 2950));
    }

    function forceNextGen() {
      cars.forEach(c => c.isDead = true);
    }

    function nextGeneration() {
      // Find the absolute best car
      let highestFitness = -1;
      let fittest = null;
      for (const car of cars) {
        if (car.fitness > highestFitness) {
          highestFitness = car.fitness;
          fittest = car;
        }
      }

      // We clone the brain of the fittest for the new generation
      const bestBrainJSON = JSON.stringify(fittest.brain);
      
      const newCars = [];
      for (let i = 0; i < TOTAL_CARS; i++) {
        const c = new Car(1400, 2950);
        // All share the DNA of the best car
        c.brain = JSON.parse(bestBrainJSON);
        if (i !== 0) {
          // Mutate all EXCEPT the first one (Elitism, guaranteeing we don't un-learn)
          NeuralNetwork.mutate(c.brain, 0.25);
        } else {
          c.color = "#00ff00"; // Mark the pure elite car
        }
        newCars.push(c);
      }

      cars = newCars;
      generation++;
      timeAlive = 0;
      document.getElementById("ui-gen").textContent = generation;
    }

    function resize() {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    // --- DRAWING ---
    function drawTrack() {
      const scale = viewport.scale;
      ctx.save();
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      const drawPath = (width, color, dash = []) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = width * scale;
        ctx.setLineDash(dash.map(d => d * scale));
        ctx.beginPath();
        trackSpline.forEach((p, i) => {
          const sx = (p.x - viewport.x) * scale;
          const sy = (p.y - viewport.y) * scale;
          if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.closePath();
        ctx.stroke();
      };

      drawPath(track.roadWidth + 100, "#d4b483"); // Gravel
      drawPath(track.roadWidth + 12, "#1a1e24");  // Border
      drawPath(track.roadWidth, "#2a2e35");       // Asphalt
      ctx.restore();
    }

    let lastTime = performance.now();
    function tick(now) {
      const dt = Math.min(0.06, (now - lastTime) / 1000);
      lastTime = now;
      timeAlive += dt;

      // Update AI
      let aliveCount = 0;
      bestCar = cars[0]; // arbitrary fallback
      let highestFit = -1;

      cars.forEach(car => {
        car.update(dt);
        if (!car.isDead) aliveCount++;
        // Track the leader visually
        if (!car.isDead && car.fitness > highestFit) {
          highestFit = car.fitness;
          bestCar = car;
        }
      });

      // Camera Follows best alive car or fallbacks to the new elite reference
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      viewport.scale = 0.8;
      const camTarget = (aliveCount > 0) ? bestCar : cars[0];
      viewport.x = camTarget.x - (w / viewport.scale) / 2;
      viewport.y = camTarget.y - (h / viewport.scale) / 2;

      // Draw
      ctx.fillStyle = "#1a3c26"; 
      ctx.fillRect(0, 0, w, h);
      drawTrack();
      
      // Draw faded dead cars to show history, bright alive cars
      cars.forEach(car => { ctx.globalAlpha = car.isDead ? 0.05 : 1.0; car.draw(ctx); });
      ctx.globalAlpha = 1.0;

      // Optimización de UI: solo actualizar si cambia el valor
      const uiAlive = document.getElementById("ui-alive");
      const uiBest = document.getElementById("ui-best");
      
      if (uiAlive.textContent !== aliveCount.toString()) uiAlive.textContent = aliveCount;
      const roundedFit = Math.round(highestFit);
      if (uiBest.textContent !== roundedFit.toString()) uiBest.textContent = roundedFit;

      // Evolution trigger
      if (aliveCount === 0 || timeAlive > 40) {
        nextGeneration();
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
